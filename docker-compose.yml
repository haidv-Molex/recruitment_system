services:
  # Database Service (PostgreSQL 15)
  db:
    image: postgres:15-alpine
    container_name: recruitment_db
    restart: always
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-recruitment_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount the schema folder from backend for automatic DB initialization on startup
      - ./backend/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-recruitment_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache & Session Service (Redis 7)
  redis:
    image: redis:7-alpine
    container_name: recruitment_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend App Service (Express & Socket.io Server)
  backend:
    image: recruitment_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitment_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PG_HOST=db
      - REDIS_HOST=redis
      - USE_REDIS=true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend App Service (React + Vite served via Nginx)
  frontend:
    image: recruitment_frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    container_name: recruitment_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
